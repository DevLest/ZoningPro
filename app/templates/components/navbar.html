{# Top navigation — expects: nav_active, navbar_export_href, user_display_name #}
<nav class="fixed top-0 z-50 h-16 w-full border-b border-slate-200/80 bg-white/70 dark:border-slate-800 dark:bg-slate-900/70 glass-header shadow-sm dark:shadow-none">
  <div class="mx-auto flex h-full w-full max-w-screen-2xl items-center justify-between px-4 sm:px-8">
    <div class="flex items-center gap-6 md:gap-8">
      <a href="/" class="text-2xl font-black tracking-tighter text-teal-900 dark:text-teal-50">ZoningPro</a>
      <div class="hidden items-center gap-6 font-sans text-sm font-medium tracking-tight antialiased md:flex">
        <a
          href="/"
          class="transition-colors {% if nav_active == 'dashboard' %}border-b-2 border-teal-700 pb-1 text-teal-700 dark:border-teal-300 dark:text-teal-300{% else %}text-slate-600 hover:text-teal-600 dark:text-slate-400 dark:hover:text-teal-300{% endif %}"
          >Dashboard</a
        >
        <a
          href="/applications/new"
          class="transition-colors {% if nav_active == 'new_application' %}border-b-2 border-teal-700 pb-1 text-teal-700 dark:border-teal-300 dark:text-teal-300{% else %}text-slate-600 hover:text-teal-600 dark:text-slate-400 dark:hover:text-teal-300{% endif %}"
          >New Application</a
        >
        <a
          href="/"
          class="transition-colors {% if nav_active == 'estimations' %}border-b-2 border-teal-700 pb-1 text-teal-700 dark:border-teal-300 dark:text-teal-300{% else %}text-slate-600 hover:text-teal-600 dark:text-slate-400 dark:hover:text-teal-300{% endif %}"
          >Estimations</a
        >
        <a
          href="{{ navbar_export_href }}"
          class="transition-colors {% if nav_active == 'documents' %}border-b-2 border-teal-700 pb-1 text-teal-700 dark:border-teal-300 dark:text-teal-300{% else %}text-slate-600 hover:text-teal-600 dark:text-slate-400 dark:hover:text-teal-300{% endif %}"
          >Documents</a
        >
      </div>
    </div>
    <div class="flex items-center gap-2 sm:gap-4">
      <a
        href="{{ navbar_export_href }}"
        class="hidden scale-95 rounded-xl bg-primary px-4 py-2 text-sm font-semibold text-on-primary transition-transform active:scale-90 sm:inline-flex sm:items-center"
        >Export</a
      >
      <button type="button" class="rounded-full p-2 text-slate-600 transition-all hover:bg-teal-50/50 dark:text-slate-400" aria-label="Notifications">
        <span class="material-symbols-outlined">notifications</span>
      </button>
      <div class="hidden items-center gap-2 border-l border-outline-variant/30 pl-4 lg:flex">
        <span class="material-symbols-outlined text-teal-800 dark:text-teal-200">account_circle</span>
        <span class="text-sm font-semibold text-on-surface">{{ user_display_name }}</span>
      </div>
    </div>
  </div>
