<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  {% include "components/head_tailwind.html" %}
  <title>{% block title %}ZoningPro{% endblock %}</title>
  {% block head_extra %}{% endblock %}
  <link rel="stylesheet" href="/static/css/app.css"/>
</head>
<body class="min-h-screen bg-surface text-on-surface antialiased">
  <div class="flex min-h-screen flex-col">
    <header class="border-b border-slate-200/80 bg-white/90 py-5 text-center dark:border-slate-800 dark:bg-slate-900/90">
      <span class="text-2xl font-black tracking-tighter text-teal-900 dark:text-teal-50">ZoningPro</span>
      <p class="mt-1 text-xs font-medium text-slate-500 dark:text-slate-400">Locational clearance</p>
    </header>
    <main class="flex flex-1 flex-col items-center justify-center px-4 py-10 md:px-8">
      <div class="w-full {% block content_wrapper_class %}max-w-md{% endblock %}">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
